services:
  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      PORT: 4000

  web:
    build:
      context: ./frontend
      args:
        API_URL: http://api:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      API_URL: http://api:4000
