services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "/bin/ollama serve & sleep 5 && ollama pull gemma3 && wait"]

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - ollama
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      OLLAMA_URL: http://ollama:11434
      PORT: 4000

  web:
    build:
      context: ./frontend
      args:
        API_URL: http://api:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      API_URL: http://api:4000

volumes:
  ollama_data:
