services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    command: ["node", "dist/apps/api/main.js"]
    environment: &env
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_WEBHOOK_URL: ${MAIL_WEBHOOK_URL}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      FRONTEND_URL: ${FRONTEND_URL:-https://hireme-26jx8s8ud-magno-1066s-projects.vercel.app}
      API_PORT: ${API_PORT:-4000}
      QUEUE_PORT: ${QUEUE_PORT:-4001}

  queue:
    build: .
    restart: unless-stopped
    ports:
      - "${QUEUE_PORT:-4001}:${QUEUE_PORT:-4001}"
    command: ["node", "dist/apps/queue/main.js"]
    environment: *env
