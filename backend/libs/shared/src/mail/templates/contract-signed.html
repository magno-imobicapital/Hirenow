<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contrato Assinado</title>
    <style>
      body { margin: 0; padding: 0; background: #f4f6f8; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      table { border-collapse: collapse; }
      @media (max-width: 620px) {
        .container { width: 100% !important; }
        .px { padding-left: 28px !important; padding-right: 28px !important; }
        .h1 { font-size: 26px !important; }
      }
    </style>
  </head>
  <body>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8;">
      <tr>
        <td align="center" style="padding: 40px 16px;">
          <table role="presentation" width="600" class="container" cellpadding="0" cellspacing="0" style="width:600px;max-width:600px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(36,46,53,0.08);">

            <tr>
              <td style="background:linear-gradient(145deg,#16a34a 0%,#15803d 50%,#242E35 100%);padding:40px 48px 56px 48px;" class="px">
                <img src="{{logoUrl}}" alt="Hireme" height="22" style="display:block;height:22px;width:auto;" />
                <div style="height:48px;">&nbsp;</div>
                <h1 class="h1" style="margin:0;font-family:'Outfit',sans-serif;color:#ffffff;font-size:32px;font-weight:700;">Contrato assinado!</h1>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:48px 48px 16px 48px;">
                <p style="margin:0 0 18px 0;font-size:15px;line-height:1.65;color:#242E35;">O candidato <strong style="color:#0178AD;">{{candidateName}}</strong> aceitou e assinou o contrato para a vaga abaixo.</p>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:0 48px 32px 48px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f7f9fb;border:1px solid #e6ebf0;border-left:3px solid #16a34a;border-radius:12px;">
                  <tr>
                    <td style="padding:22px 24px;">
                      <p style="margin:0 0 6px 0;font-size:11px;font-weight:600;color:#8a96a0;letter-spacing:0.1em;text-transform:uppercase;">Vaga</p>
                      <p style="margin:0;font-size:18px;font-weight:600;color:#242E35;">{{positionTitle}}</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:0 48px;">
                <div style="height:1px;background:linear-gradient(90deg,transparent,#e6ebf0,transparent);"></div>
              </td>
            </tr>

            <tr>
              <td class="px" style="padding:28px 48px 40px 48px;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#8a96a0;">Os documentos do contratado já estão disponíveis na plataforma.</p>
                <p style="margin:14px 0 0 0;font-size:11px;color:#8a96a0;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;">Hireme · Recrutamento sem ruído</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
